<html>
    <head>
        <title>Technical Institute Certification Program - Student Add</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Technical Institute Certification Program</h1>
        <a href="menu.html">
            <button type="button">Back to Menu</button>
        </a>
        <div>Please enter the details of the new student below:</div>
        <br>
        <form action="StudentAddServlet" method="POST">
            <label for="fname">First Name:</label><br>
            <input type="text" id="fname" name="fname" required/><br>
            <br>
            <label for="lname">Last Name:</label><br>
            <input type="text" id="lname" name="lname" required/><br>
            <br>
            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required/><br>
            <br>
            <label for="email">Email:</label><br>
            <input type="text" id="email" name="email" required/><br>
            <br>
            <label for="studentid">Student ID:</label><br>
            <input type="text" id="studentid" name="studentid" required/><br>
            <br>
            <input type="submit"/><br>
            <br>           
        </form>
    </body>
</html>
