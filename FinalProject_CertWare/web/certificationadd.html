<html>
    <head>
        <title>Technical Institute Certification Program - Certification Add</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Technical Institute Certification Program</h1>
        <div>Please enter the details to add student certification below:</div>
        <br>
        <form action="CertificationAddServlet" method="POST">
            <label for="studentid">Student ID:</label><br>
            <input type="number" id="studentid" name="studentid" required/><br>
            <br>
            <label for="certid">Certification ID:</label><br>
            <input type="number" id="certid" name="certid" required/><br>
            <br>
            <label for="issuedate">Issue Date:</label><br>
            <input type="date" id="issuedate" name="issuedate" required/><br>
            <br>
            <label for="expirydate">Expiry Date (leave blank if does not expire):</label><br>
            <input type="date" id="expirydate" name="expirydate" required/><br>
            <br>
            <input type="submit"/><br>
            <br>
        </form>
        <br>
        <a href="menu.html"><button type="button">Back to Menu</button></a>
    </body>
</html>
